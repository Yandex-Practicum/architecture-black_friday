name: sharding-repl-cache

services:

  redis:
    image: "redis:latest"
    container_name: redis
    expose:
      - 6379
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      start_period: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network
    restart: always
