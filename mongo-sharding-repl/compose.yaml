services:

  configSrv:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: configSrv
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.10
    volumes:
      - config-data:/data/db
    command: ["mongod","--configsvr","--replSet","config_server","--bind_ip_all","--port","27017"]
    healthcheck:
      test: ["CMD","mongosh","--quiet","--port","27017","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  shard1-1:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-1
    restart: always
    ports:
      - "27018:27018"
    networks:
      app-network:
        ipv4_address: 173.17.0.11
    volumes:
      - shard1-1-data:/data/db
    command: ["mongod","--shardsvr","--replSet","shard1","--bind_ip_all","--port","27018"]
    healthcheck:
      test: ["CMD","mongosh","--quiet","--port","27018","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  shard1-2:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-2
    restart: always
    networks:
      app-network:
        ipv4_address: 173.17.0.12
    volumes:
      - shard1-2-data:/data/db
    command: ["mongod","--shardsvr","--replSet","shard1","--bind_ip_all","--port","27018"]
    healthcheck:
      test: ["CMD","mongosh","--quiet","--port","27018","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  shard1-3:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-3
    restart: always
    networks:
      app-network:
        ipv4_address: 173.17.0.13
    volumes:
      - shard1-3-data:/data/db
    command: ["mongod","--shardsvr","--replSet","shard1","--bind_ip_all","--port","27018"]
    healthcheck:
      test: ["CMD","mongosh","--quiet","--port","27018","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  shard2-1:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-1
    restart: always
    ports:
      - "27019:27019"
    networks:
      app-network:
        ipv4_address: 173.17.0.14
    volumes:
      - shard2-1-data:/data/db
    command: ["mongod","--shardsvr","--replSet","shard2","--bind_ip_all","--port","27019"]
    healthcheck:
      test: ["CMD","mongosh","--quiet","--port","27019","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  shard2-2:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-2
    restart: always
    networks:
      app-network:
        ipv4_address: 173.17.0.15
    volumes:
      - shard2-2-data:/data/db
    command: ["mongod","--shardsvr","--replSet","shard2","--bind_ip_all","--port","27019"]
    healthcheck:
      test: ["CMD","mongosh","--quiet","--port","27019","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  shard2-3:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-3
    restart: always
    networks:
      app-network:
        ipv4_address: 173.17.0.16
    volumes:
      - shard2-3-data:/data/db
    command: ["mongod","--shardsvr","--replSet","shard2","--bind_ip_all","--port","27019"]
    healthcheck:
      test: ["CMD","mongosh","--quiet","--port","27019","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  mongo_router:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongo_router
    restart: always
    ports:
      - "27020:27020"
    networks:
      app-network:
        ipv4_address: 173.17.0.7
    command: ["mongos","--configdb","config_server/configSrv:27017","--bind_ip_all","--port","27020"]
    depends_on:
      - configSrv
      - shard1-1
      - shard1-2
      - shard1-3
      - shard2-1
      - shard2-2
      - shard2-3
    healthcheck:
      test: ["CMD","mongosh","--quiet","--port","27020","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  pymongo_api:
    container_name: pymongo_api
    build:
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongo_router
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongo_router:27020"
      MONGODB_DATABASE_NAME: "somedb"
    networks:
      app-network:
        ipv4_address: 173.17.0.6

networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 173.17.0.0/16

volumes:
  config-data:
  shard1-1-data:
  shard1-2-data:
  shard1-3-data:
  shard2-1-data:
  shard2-2-data:
  shard2-3-data:
