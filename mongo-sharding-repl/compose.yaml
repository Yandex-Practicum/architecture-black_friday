name: mongo-sharding-repl

services:
  configsvr:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --configsvr
      - --replSet
      - configReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - configsvr_data:/data/db

  configsvr1:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --configsvr
      - --replSet
      - configReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - configsvr1_data:/data/db

  configsvr2:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --configsvr
      - --replSet
      - configReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - configsvr2_data:/data/db

  shard1:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard1ReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - shard1_data:/data/db

  shard1_1:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard1ReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - shard1_1_data:/data/db

  shard1_2:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard1ReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - shard1_2_data:/data/db

  shard2:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard2ReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - shard2_data:/data/db

  shard2_1:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard2ReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - shard2_1_data:/data/db

  shard2_2:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard2ReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - shard2_2_data:/data/db

  mongos:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongos
      - --configdb
      - configReplSet/configsvr:27017,configsvr1:27017,configsvr2:27017
      - --bind_ip_all
      - --port
      - "27017"
    depends_on:
      - configsvr
      - configsvr1
      - configsvr2
    ports:
      - "27017:27017"

  pymongo_api:
    build:
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"

volumes:
  configsvr_data:
  configsvr1_data:
  configsvr2_data:
  shard1_data:
  shard1_1_data:
  shard1_2_data:
  shard2_data:
  shard2_1_data:
  shard2_2_data: