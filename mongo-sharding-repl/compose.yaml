name: mongo-sharding-repl

services:
  config-server:
    image: mongo:latest
    container_name: config-server
    command: mongod --configsvr --replSet configReplSet --port 27019
    ports:
      - "27019:27019"
    volumes:
      - config_db_data:/data/db

  shard1-primary:
    image: mongo:latest
    container_name: shard1-primary
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018
    ports:
      - "27018:27018"
    volumes:
      - shard1-primary:/data/db

  shard1-secondary1:
    image: mongo:latest
    container_name: shard1-secondary1
    command: mongod --shardsvr --replSet shard1ReplSet --port 27028
    ports:
      - "27028:27028"
    volumes:
      - shard1-secondary1:/data/db

  shard1-secondary2:
    image: mongo:latest
    container_name: shard1-secondary2
    command: mongod --shardsvr --replSet shard1ReplSet --port 27038
    ports:
      - "27038:27038"
    volumes:
      - shard1-secondary2:/data/db

  shard2-primary:
    image: mongo:latest
    container_name: shard2-primary
    command: mongod --shardsvr --replSet shard2ReplSet --port 27020
    ports:
      - "27020:27020"
    volumes:
      - shard2-primary:/data/db

  shard2-secondary1:
    image: mongo:latest
    container_name: shard2-secondary1
    command: mongod --shardsvr --replSet shard2ReplSet --port 27030
    ports:
      - "27030:27030"
    volumes:
      - shard2-secondary1:/data/db

  shard2-secondary2:
    image: mongo:latest
    container_name: shard2-secondary2
    command: mongod --shardsvr --replSet shard2ReplSet --port 27040
    ports:
      - "27040:27040"
    volumes:
      - shard2-secondary2:/data/db

  mongos:
    image: mongo:latest
    container_name: mongos
    command: mongos --configdb configReplSet/config-server:27019 --port 27017 --bind_ip_all
    ports:
      - "27017:27017"
    depends_on:
      - config-server
      - shard1-primary
      - shard1-secondary1
      - shard1-secondary2
      - shard2-primary
      - shard2-secondary1
      - shard2-secondary2

  pymongo_api:
    container_name: pymongo_api
    build:
      context: api_app
      dockerfile: ../api_app/Dockerfile
    depends_on:
      - mongos
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos:27017/somedb"
      MONGODB_DATABASE_NAME: "somedb"

volumes:
  config_db_data:
  shard1-primary:
  shard1-secondary1:
  shard1-secondary2:
  shard2-primary:
  shard2-secondary1:
  shard2-secondary2:
