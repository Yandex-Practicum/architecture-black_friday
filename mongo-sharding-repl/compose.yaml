name: mongo-sharding-repl

services:
  # Config Server Replica Set (3 members)
  configsvr-1:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: configsvr-1
    command: ["mongod", "--configsvr", "--replSet", "configReplSet", "--port", "27019", "--bind_ip_all"]
    volumes:
      - configsvr1_data:/data/configdb

  configsvr-2:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: configsvr-2
    command: ["mongod", "--configsvr", "--replSet", "configReplSet", "--port", "27019", "--bind_ip_all"]
    volumes:
      - configsvr2_data:/data/configdb

  configsvr-3:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: configsvr-3
    command: ["mongod", "--configsvr", "--replSet", "configReplSet", "--port", "27019", "--bind_ip_all"]
    volumes:
      - configsvr3_data:/data/configdb

  # Shard 1 Replica Set (3 members)
  shard1-1:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-1
    command: ["mongod", "--shardsvr", "--replSet", "shard1rs", "--port", "27018", "--bind_ip_all"]
    volumes:
      - shard1_1_data:/data/db

  shard1-2:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-2
    command: ["mongod", "--shardsvr", "--replSet", "shard1rs", "--port", "27018", "--bind_ip_all"]
    volumes:
      - shard1_2_data:/data/db

  shard1-3:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-3
    command: ["mongod", "--shardsvr", "--replSet", "shard1rs", "--port", "27018", "--bind_ip_all"]
    volumes:
      - shard1_3_data:/data/db

  # Shard 2 Replica Set (3 members)
  shard2-1:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-1
    command: ["mongod", "--shardsvr", "--replSet", "shard2rs", "--port", "27020", "--bind_ip_all"]
    volumes:
      - shard2_1_data:/data/db

  shard2-2:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-2
    command: ["mongod", "--shardsvr", "--replSet", "shard2rs", "--port", "27020", "--bind_ip_all"]
    volumes:
      - shard2_2_data:/data/db

  shard2-3:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-3
    command: ["mongod", "--shardsvr", "--replSet", "shard2rs", "--port", "27020", "--bind_ip_all"]
    volumes:
      - shard2_3_data:/data/db

  # Mongos Router
  mongos:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongos
    ports:
      - "27017:27017"
    depends_on:
      - configsvr-1
      - configsvr-2
      - configsvr-3
      - shard1-1
      - shard1-2
      - shard1-3
      - shard2-1
      - shard2-2
      - shard2-3
    command: ["mongos", "--configdb", "configReplSet/configsvr-1:27019,configsvr-2:27019,configsvr-3:27019", "--port", "27017", "--bind_ip_all"]

  # Application
  pymongo_api:
    image: kazhem/pymongo_api:1.0.0
    container_name: pymongo_api
    depends_on:
      - mongos
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"
    ports:
      - "8080:8080"

volumes:
  configsvr1_data:
  configsvr2_data:
  configsvr3_data:
  shard1_1_data:
  shard1_2_data:
  shard1_3_data:
  shard2_1_data:
  shard2_2_data:
  shard2_3_data:
