name: mongo-sharding

services:
  shard1:
    container_name: shard1
    image: dh-mirror.gitverse.ru/mongo:latest
    ports:
      - "27018:27018"
    volumes:
      - shard1_data_container:/data/db
    command: mongod --shardsvr --replSet shard1 --bind_ip_all --port 27018
  
  shard2:
    container_name: shard2
    image: dh-mirror.gitverse.ru/mongo:latest
    ports:
      - "27019:27019"
    volumes:
      - shard2_data_container:/data/db
    command: mongod --shardsvr --replSet shard2 --bind_ip_all --port 27019

  configSrv:
    container_name: configSrv 
    image: dh-mirror.gitverse.ru/mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - config_data:/data/db
    command: mongod --configsvr --replSet config_server --bind_ip_all --port 27017

  mongosRouter:
    container_name: mongosRouter
    image: dh-mirror.gitverse.ru/mongo:latest
    ports:
      - "27020:27020"
    command: mongos --configdb config_server/configSrv:27017 --bind_ip_all --port 27020

  pymongo_api:
    container_name: pymongo_api
    build: 
      context: api_app
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongosRouter:27020"
      MONGODB_DATABASE_NAME: "somedb"


volumes:
  config_data:
  shard1_data_container:
  shard2_data_container: