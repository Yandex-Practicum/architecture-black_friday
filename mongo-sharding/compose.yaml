name: mongo-sharding

services:
  configsvr:
    image: mongo
    container_name: configsvr
    command: mongod --configsvr --replSet configReplSet --port 27019 --dbpath /data/db
    volumes:
      - config_data:/data/db
    ports:
      - "27019:27019"

  shard1:
    image: mongo
    container_name: shard1
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018 --dbpath /data/db
    volumes:
      - shard1_data:/data/db
    ports:
      - "27018:27018"

  shard2:
    image: mongo
    container_name: shard2
    command: mongod --shardsvr --replSet shard2ReplSet --port 27020 --dbpath /data/db
    volumes:
      - shard2_data:/data/db
    ports:
      - "27020:27020"

  mongos:
    image: mongo
    container_name: mongos
    depends_on:
      - configsvr
      - shard1
      - shard2
    ports:
      - "27017:27017"
    command: >
      bash -c "
        sleep 10 &&
        mongos --configdb configReplSet/configsvr:27019 --bind_ip_all
      "

  pymongo_api:
    build:
      context: api_app
      dockerfile: Dockerfile
    image: kazhem/pymongo_api:1.0.0
    platform: linux/amd64
    depends_on:
      - mongos
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"

volumes:
  config_data:
  shard1_data:
  shard2_data:
