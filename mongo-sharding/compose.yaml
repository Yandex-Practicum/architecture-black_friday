name: mongo-sharding

services:
  configsvr:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --configsvr
      - --replSet
      - configReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - configsvr_data:/data/db

  shard1:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard1ReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - shard1_data:/data/db

  shard2:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard2ReplSet
      - --bind_ip_all
      - --port
      - "27017"
    volumes:
      - shard2_data:/data/db

  mongos:
    image: dh-mirror.gitverse.ru/mongo:latest
    command:
      - mongos
      - --configdb
      - configReplSet/configsvr:27017
      - --bind_ip_all
      - --port
      - "27017"
    depends_on:
      - configsvr
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  pymongo_api:
    build:
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      mongos:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"

volumes:
  configsvr_data:
  shard1_data:
  shard2_data: