name: mongo-sharding

services:
  configSrv:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    networks:
      - app-network
    volumes:
      - config-data:/data/db
    command: ["mongod","--configsvr","--replSet","config_server","--bind_ip_all","--port","27017"]
    healthcheck:
      test: ["CMD","mongosh","--port","27017","--quiet","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  shard1:
    image: mongo:6
    restart: always
    ports:
      - "27018:27018"
    networks:
      - app-network
    volumes:
      - shard1-data:/data/db
    command: ["mongod","--shardsvr","--replSet","shard1","--bind_ip_all","--port","27018"]
    healthcheck:
      test: ["CMD","mongosh","--port","27018","--quiet","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  shard2:
    image: mongo:6
    restart: always
    ports:
      - "27019:27019"
    networks:
      - app-network
    volumes:
      - shard2-data:/data/db
    command: ["mongod","--shardsvr","--replSet","shard2","--bind_ip_all","--port","27019"]
    healthcheck:
      test: ["CMD","mongosh","--port","27019","--quiet","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  mongos_router:
    image: mongo:6
    restart: always
    depends_on:
      - configSrv
      - shard1
      - shard2
    # Порт вовне не публикуем — чтобы можно было масштабировать без конфликта портов.
    networks:
      - app-network
    command: ["mongos","--configdb","config_server/configSrv:27017","--bind_ip_all","--port","27020"]
    healthcheck:
      test: ["CMD","mongosh","--port","27020","--quiet","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      start_period: 10s

  api:
    build:
      context: ./api_app
      dockerfile: Dockerfile
    container_name: pymongo_api
    depends_on:
      - mongos_router
    environment:
      MONGODB_URL: "mongodb://mongos_router:27020"
      MONGODB_DATABASE_NAME: "somedb"
      SHARD1_URL: "mongodb://shard1:27018"
      SHARD2_URL: "mongodb://shard2:27019"
    ports:
      - "8080:8080"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  config-data:
  shard1-data:
  shard2-data:
