name: mongo-sharding

services:
  # ---------------- Core Mongo nodes ----------------
  configSrv:
    image: mongo:6
    hostname: configSrv
    command: ["--configsvr","--replSet","config_server","--bind_ip_all","--port","27017"]
    volumes: [ "config-data:/data/db" ]
    healthcheck:
      test: ["CMD","mongosh","--port","27017","--quiet","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks: [mesh]

  shard1:
    image: mongo:6
    hostname: shard1
    command: ["--shardsvr","--replSet","shard1","--bind_ip_all","--port","27018"]
    volumes: [ "shard1-data:/data/db" ]
    healthcheck:
      test: ["CMD","mongosh","--port","27018","--quiet","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks: [mesh]

  shard2:
    image: mongo:6
    hostname: shard2
    command: ["--shardsvr","--replSet","shard2","--bind_ip_all","--port","27019"]
    volumes: [ "shard2-data:/data/db" ]
    healthcheck:
      test: ["CMD","mongosh","--port","27019","--quiet","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks: [mesh]

  # ------------- Init step 1: init replica sets -------------
  init_config:
    image: mongo:6
    depends_on:
      configSrv: { condition: service_healthy }
      shard1:    { condition: service_healthy }
      shard2:    { condition: service_healthy }
    command: ["bash","-lc","/scripts/init-rs.sh"]
    volumes:
      - ./scripts:/scripts:ro
    networks: [mesh]
    restart: "no"

  # ----------------- Mongos router (after RS) ----------------
  mongos_router:
    image: mongo:6
    depends_on:
      init_config: { condition: service_completed_successfully }
    command: ["mongos","--configdb","config_server/configSrv:27017","--bind_ip_all","--port","27020"]
    healthcheck:
      test: ["CMD","mongosh","--port","27020","--quiet","--eval","db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 60
    networks: [mesh]

  # ------------- Init step 2: shard DB & seed data -------------
  init_sharding:
    image: mongo:6
    depends_on:
      mongos_router: { condition: service_healthy }
      init_config:   { condition: service_completed_successfully }
    command: ["bash","-lc","/scripts/init-sharding.sh"]
    volumes:
      - ./scripts:/scripts:ro
    networks: [mesh]
    restart: "no"

  # ------------------------- App -------------------------
  pymongo-api:
    image: kazhem/pymongo_api:1.0.0
    ports: ["8080:8080"]
    depends_on:
      init_sharding: { condition: service_completed_successfully }
      mongos_router: { condition: service_healthy }
    environment:
      MONGODB_URL: "mongodb://mongos_router:27020"
      MONGODB_DATABASE_NAME: "somedb"
    networks: [mesh]

networks:
  mesh:

volumes:
  config-data:
  shard1-data:
  shard2-data:
