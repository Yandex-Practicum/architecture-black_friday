services:

  configSrv:
    container_name: configSrv 
    image: dh-mirror.gitverse.ru/mongo:latest
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-network:
    volumes:
      - config-data:/data/db
    command:
      [
        "--configsvr",
        "--replSet",
        "config_server",
        "--bind_ip_all",
        "--port",
        "27017"
      ] 
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongos_router:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongos_router
    restart: always
    ports:
      - "27020:27020"
    networks:
      app-network:
    command:
      - mongos
      - --configdb
      - config_server/configSrv:27017
      - --bind_ip_all
      - --port
      - "27020"
    healthcheck:
      test: [ "CMD", "mongosh", "--port", "27020", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongo_shard1:
    container_name: mongo_shard1
    image: dh-mirror.gitverse.ru/mongo:latest
    restart: always
    networks:
      app-network:
    ports:
      - 27018:27018
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard1
      - --bind_ip_all
      - --port
      - "27018"
    volumes:
      - mongo_shard1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  mongo_shard2:
    container_name: mongo_shard2
    image: dh-mirror.gitverse.ru/mongo:latest
    restart: always
    networks:
      app-network:
    ports:
      - "27019:27019"
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard2
      - --bind_ip_all
      - --port
      - "27019"
    volumes:
      - mongo_shard2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  pymongo_api:
    container_name: pymongo_api
    restart: always
    build: 
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos_router
    ports:
      - 8080:8080
    networks:
      app-network:
    environment:
      MONGODB_URL: "mongodb://mongos_router:27020"
      MONGODB_DATABASE_NAME: "somedb"

networks:
  app-network:
    driver: bridge

volumes:
  mongo_shard1_data:
  mongo_shard2_data:
  config-data: