version: "3.8"

name: mongo-sharding

services:

  configSrv:
    image: mongo:latest
    container_name: configSrv
    command: [
      "--configsvr",
      "--replSet", "config_server",
      "--bind_ip_all",
      "--port", "27017"
    ]
    ports:
      - "27017:27017"

  shard1:
    image: mongo:latest
    container_name: shard1
    command: [
      "--shardsvr",
      "--replSet", "shard1",
      "--bind_ip_all",
      "--port", "27018"
    ]
    ports:
      - "27018:27018"

  shard2:
    image: mongo:latest
    container_name: shard2
    command: [
      "--shardsvr",
      "--replSet", "shard2",
      "--bind_ip_all",
      "--port", "27019"
    ]
    ports:
      - "27019:27019"

  mongos_router:
    image: mongo:latest
    container_name: mongos_router
    command: [
      "mongos",
      "--configdb", "config_server/configSrv:27017",
      "--bind_ip_all",
      "--port", "27020"
    ]
    ports:
      - "27020:27020"

  pymongo-api:
    build: ./api_app
    container_name: pymongo-api
    environment:
      - MONGO_URL=mongodb://mongos_router:27020
    ports:
      - "8080:8080"
    depends_on:
      - mongos_router