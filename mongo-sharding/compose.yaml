name: mongo-sharding

services:
  pymongo_api:
    image: kazhem/pymongo_api:1.0.0
    container_name: pymongo_api
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
    depends_on:
      - mongos

  configSrv:
    image: mongo:latest
    container_name: configSrv
    ports:
      - "27019:27019"
    command: mongod --configsvr --replSet configReplSet --port 27019 --bind_ip_all

  shard1:
    image: mongo:latest
    container_name: shard1
    ports:
      - "27018:27018"
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018 --bind_ip_all

  shard2:
    image: mongo:latest
    container_name: shard2
    expose:
      - "27018"
    command: mongod --shardsvr --replSet shard2ReplSet --port 27018 --bind_ip_all

  mongos:
    image: mongo:latest
    container_name: mongos
    ports:
      - "27017:27017"
    command: mongos --configdb configReplSet/configSrv:27019 --bind_ip_all --port 27017
    depends_on:
      - configSrv
