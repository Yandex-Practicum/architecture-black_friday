name: mongo-sharding

services:
  configsvr1:
    image: dh-mirror.gitverse.ru/mongo:latest
    command: --configsvr --replSet configReplSet --dbpath /data/db --port 27019
    volumes:
      - configsvr1_data:/data/db
    networks:
      - mongo-sharding-net

  configsvr2:
    image: dh-mirror.gitverse.ru/mongo:latest
    command: --configsvr --replSet configReplSet --dbpath /data/db --port 27019
    volumes:
      - configsvr2_data:/data/db
    networks:
      - mongo-sharding-net

  configsvr3:
    image: dh-mirror.gitverse.ru/mongo:latest
    command: --configsvr --replSet configReplSet --dbpath /data/db --port 27019
    volumes:
      - configsvr3_data:/data/db
    networks:
      - mongo-sharding-net

  shard1:
    image: dh-mirror.gitverse.ru/mongo:latest
    command: --shardsvr --replSet shard1ReplSet --dbpath /data/db --port 27018
    volumes:
      - shard1_data:/data/db
    networks:
      - mongo-sharding-net

  shard2:
    image: dh-mirror.gitverse.ru/mongo:latest
    command: --shardsvr --replSet shard2ReplSet --dbpath /data/db --port 27018
    volumes:
      - shard2_data:/data/db
    networks:
      - mongo-sharding-net

  mongos:
    image: dh-mirror.gitverse.ru/mongo:latest
    command: >
      mongos
      --configdb configReplSet/configsvr1:27019,configsvr2:27019,configsvr3:27019
      --port 27017
      --bind_ip_all
    depends_on:
      - configsvr1
      - configsvr2
      - configsvr3
    networks:
      - mongo-sharding-net

  pymongo_api:
    build:
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"
    networks:
      - mongo-sharding-net

networks:
  mongo-sharding-net:
    driver: bridge

volumes:
  configsvr1_data:
  configsvr2_data:
  configsvr3_data:
  shard1_data:
  shard2_data: