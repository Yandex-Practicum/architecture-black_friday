name: mongo-sharding

services:
  mongo_config_srv:
    image: mongo:latest
    container_name: mongo_config_srv
    entrypoint: ["/scripts/init_mongo_config_srv.sh"]
    healthcheck:
      test: mongosh --port 27017 --eval "db.adminCommand('ping')"
      interval: 5s
      start_period: 40s
      timeout: 5s
      retries: 3
    restart: always
    ports:
      - 27017:27017
    networks:
      app-network:
        ipv4_address: 173.17.0.10
    volumes:
      - config-data:/data/db
      - ./scripts/init_mongo_config_srv.sh:/scripts/init_mongo_config_srv.sh
    
  mongo_shard1:
    image: mongo:latest
    container_name: mongo_shard1
    entrypoint: ["/scripts/init_mongo_shard1.sh"]
    healthcheck:
      test: mongosh --port 27018 --eval "db.adminCommand('ping')"
      interval: 5s
      start_period: 40s
      timeout: 5s
      retries: 3
    restart: always
    ports:
      - 27018:27018
    networks:
      app-network:
        ipv4_address: 173.17.0.9
    volumes:
      - shard1-data:/data/db
      - ./scripts/init_mongo_shard1.sh:/scripts/init_mongo_shard1.sh
  
  mongo_shard2:
    image: mongo:latest
    container_name: mongo_shard2
    entrypoint: ["/scripts/init_mongo_shard2.sh"]
    healthcheck:
      test: mongosh --port 27019 --eval "db.adminCommand('ping')"
      interval: 5s
      start_period: 40s
      timeout: 5s
      retries: 3
    restart: always
    ports:
      - 27019:27019
    networks:
      app-network:
        ipv4_address: 173.17.0.8
    volumes:
      - shard2-data:/data/db
      - ./scripts/init_mongo_shard2.sh:/scripts/init_mongo_shard2.sh

  mongos_router:
    image: mongo:latest
    container_name: mongos_router
    entrypoint: ["/scripts/init_mongo_router.sh"]
    healthcheck:
      test: mongosh --port 27020 --eval "db.adminCommand('ping')"
      interval: 5s
      start_period: 40s
      timeout: 5s
      retries: 3
    restart: always
    ports:
      - 27020:27020
    networks:
      app-network:
        ipv4_address: 173.17.0.7
    volumes:
      - ./scripts/init_mongo_router.sh:/scripts/init_mongo_router.sh
    depends_on:
      mongo_config_srv:
        condition: service_healthy
      mongo_shard1:
        condition: service_healthy
      mongo_shard2:
        condition: service_healthy

  mongo_sharding:
    container_name: mongo-sharding
    build: 
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      mongos_router:
        condition: service_healthy
    ports:
      - 8080:8080
    networks:
      - app-network
    environment:
      MONGODB_URL: "mongodb://mongos_router:27020"
      MONGODB_DATABASE_NAME: "somedb"


networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 173.17.0.0/16

volumes:
  config-data:
  shard1-data:
  shard2-data:
