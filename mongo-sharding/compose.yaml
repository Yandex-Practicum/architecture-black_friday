name: mongo-sharding
services:
  # Конфигурационный сервер (Config Server Replica Set, 1 узел)
  configsrv:
    container_name: configsrv
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --configsvr --replSet configReplSet --port 27019
    volumes:
      - configsrv_data:/data/db

  # Шард 1 (Replica Set из 1 узла)
  shard1:
    container_name: shard1
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018
    volumes:
      - shard1_data:/data/db

  # Шард 2 (Replica Set из 1 узла)
  shard2:
    container_name: shard2
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard2ReplSet --port 27018
    volumes:
      - shard2_data:/data/db

  # Роутер (mongos)
  mongos_router:
    container_name: mongos_router
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongos --configdb configReplSet/configsrv:27019 --port 27017 --bind_ip_all
    ports:
      - "27017:27017"
    depends_on:
      - configsrv
      - shard1
      - shard2

  # Приложение
  pymongo_api:
    container_name: pymongo_api
    build: 
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos_router
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongos_router:27017"
      MONGODB_DATABASE_NAME: "somedb"

volumes:
  configsrv_data:
  shard1_data:
  shard2_data: