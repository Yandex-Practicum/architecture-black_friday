name: mongo-sharding

services:
  configsvr:
    image: mongo:6
    container_name: configsvr
    command: ['mongod', '--configsvr', '--replSet', 'cfgRS', '--port', '27017']
    ports:
      - '27017:27017'
    volumes:
      - config_data:/data/db

  shard1:
    image: mongo:6
    container_name: shard1
    command: ['mongod', '--shardsvr', '--replSet', 'shard1RS', '--port', '27018']
    ports:
      - '27018:27018'
    volumes:
      - shard1_data:/data/db

  shard2:
    image: mongo:6
    container_name: shard2
    command: ['mongod', '--shardsvr', '--replSet', 'shard2RS', '--port', '27019']
    ports:
      - '27019:27019'
    volumes:
      - shard2_data:/data/db

  mongos:
    image: mongo:6
    container_name: mongos
    depends_on:
      - configsvr
      - shard1
      - shard2
    command: >
      mongos --configdb cfgRS/configsvr:27017 --bind_ip_all
    ports:
      - '27020:27017'

  pymongo_api:
    container_name: pymongo_api
    build:
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: 'mongodb://mongos:27017'
      MONGODB_DATABASE_NAME: 'somedb'

volumes:
  config_data:
  shard1_data:
  shard2_data:
