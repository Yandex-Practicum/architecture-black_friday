name: mongo-sharding-repl

services:

  config:
    image: mongo:latest
    container_name: config
    networks:
      - app-network
    expose:
      - 27017
    volumes:
      - config_data:/data/db
    command: [
        "--configsvr",
        "--replSet",
        "config",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    healthcheck:
      test: [
        "CMD",
        "mongosh",
        "--port", "27017",
        "--eval",
        "db.adminCommand('ping')"
      ]
      interval: 5s
      start_period: 10s
      timeout: 5s
      retries: 3
    restart: always

  router:
    image: mongo:latest
    container_name: router
    depends_on:
      config_init:
        condition: service_completed_successfully
    networks:
      - app-network
    expose:
      - 27017
    command: [
        "mongos",
        "--configdb", 
        "config/config:27017",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    healthcheck:
      test: [
        "CMD",
        "mongosh",
        "--port", "27017",
        "--eval",
        "db.adminCommand('ping')"
      ]
      interval: 5s
      start_period: 15s
      timeout: 5s
      retries: 5
    restart: always

  shard-1-1:
    image: mongo:latest
    container_name: shard-1-1
    networks:
      - app-network
    expose:
      - 27017
    volumes:
      - shard-1-1_data:/data/db
    command: [
        "--shardsvr",
        "--replSet",
        "shard-1",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    healthcheck:
      test: [
        "CMD",
        "mongosh",
        "--port", "27017",
        "--eval",
        "db.adminCommand('ping')"
      ]
      interval: 5s
      start_period: 10s
      timeout: 5s
      retries: 3
    restart: always

