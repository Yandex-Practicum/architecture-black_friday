  sharding-repl-cache:
    build:
      context: api_app
    container_name: sharding-repl-cache
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos:27020"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: redis://redis:6379
    networks:
      - app-network

