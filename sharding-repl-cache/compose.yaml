name: mongo-sharding-repl

services:
  shard1-a:
    image: mongo:6.0
    container_name: shard1-a
    command: mongod --shardsvr --replSet rs-shard1 --port 27018
    ports:
      - 27018:27018
    volumes:
      - shard1-a_data:/data/db

  shard1-b:
    image: mongo:6.0
    container_name: shard1-b
    command: mongod --shardsvr --replSet rs-shard1 --port 27018
    volumes:
      - shard1-b_data:/data/db

  shard1-c:
    image: mongo:6.0
    container_name: shard1-c
    command: mongod --shardsvr --replSet rs-shard1 --port 27018
    volumes:
      - shard1-c_data:/data/db

  shard2-a:
    image: mongo:6.0
    container_name: shard2-a
    command: mongod --shardsvr --replSet rs-shard2 --port 27019
    ports:
      - 27019:27019
    volumes:
      - shard2-a_data:/data/db

  shard2-b:
    image: mongo:6.0
    container_name: shard2-b
    command: mongod --shardsvr --replSet rs-shard2 --port 27019
    volumes:
      - shard2-b_data:/data/db

  shard2-c:
    image: mongo:6.0
    container_name: shard2-c
    command: mongod --shardsvr --replSet rs-shard2 --port 27019
    volumes:
      - shard2-c_data:/data/db

  configsvr:
    image: mongo:6.0
    container_name: configsvr
    command: mongod --configsvr --replSet rs-config --port 27017
    ports:
      - 27017:27017
    volumes:
      - config_data:/data/db

  mongos:
    image: mongo:6.0
    container_name: mongos
    depends_on:
      - shard1-a
      - shard1-b
      - shard1-c
      - shard2-a
      - shard2-b
      - shard2-c
      - configsvr
    command: >
      bash -c 'sleep 10 && mongos --configdb rs-config/configsvr:27017 --bind_ip_all'
    ports:
      - 27020:27017
      
  redis:
    image: "redis:alpine"
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      
  pymongo_api:
    container_name: pymongo_api
    build:
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"

volumes:
  shard1-a_data:
  shard1-b_data:
  shard1-c_data:
  shard2-a_data:
  shard2-b_data:
  shard2-c_data:
  config_data:
  redis_data:
