      retries: 10
      start_period: 10s
    volumes:
      - shard1-3-data:/data/db
    networks:
      - app-network

  shard2-1:
    image: mongo:6.0
    container_name: shard2-1
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet",
        "shard2",
        "--port",
        "27019",
        "--bind_ip_all"
      ]
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - shard2-1-data:/data/db
    networks:
      - app-network

  shard2-2:
    image: mongo:6.0
    container_name: shard2-2
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet",
        "shard2",
        "--port",
        "27019",
        "--bind_ip_all"
      ]
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - shard2-2-data:/data/db
    networks:
      - app-network

  shard2-3:
    image: mongo:6.0
    container_name: shard2-3
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet",
        "shard2",
        "--port",
        "27019",
        "--bind_ip_all"
      ]
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - shard2-3-data:/data/db
    networks:
      - app-network

  mongos:
    image: mongo:6.0
    container_name: mongos
    command:
      [
        "mongos",
        "--configdb",
        "config_server/configSrv:27017",
        "--bind_ip_all",
        "--port",
        "27020"
      ]
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      retries: 10
      start_period: 10s
    ports:
      - "27020:27020"
    networks:
      - app-network

  #api_app не умеет работать с кластером, поэтому Sentinel вариант
  redis:
    image: redis:7.2
    container_name: redis
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - app-network

