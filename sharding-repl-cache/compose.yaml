#name: sharding-repl-cache
services:
  # ---------------- CONFIG SERVER ----------------
  configSrv:
    image: mongo:7
    container_name: configSrv
    command: mongod --configsvr --replSet config_server --bind_ip_all --port 27017
    volumes:
      - config-data:/data/db
    networks: [app-network]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      start_period: 10s

  config-init:
    image: mongo:7
    depends_on:
      configSrv:
        condition: service_healthy
    networks: [app-network]
    entrypoint: >
      mongosh --host configSrv:27017 --eval '
      rs.initiate({
        _id: "config_server",
        configsvr: true,
        members: [{ _id: 0, host: "configSrv:27017" }]
      })'

  # ---------------- SHARD 1 (REPLICA SET) ----------------
  shard1-1:
    image: mongo:7
    command: mongod --shardsvr --replSet shard1 --bind_ip_all --port 27018
    volumes: [shard1-1-data:/data/db]
    networks: [app-network]
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      start_period: 10s

  shard1-2:
    image: mongo:7
    command: mongod --shardsvr --replSet shard1 --bind_ip_all --port 27018
    volumes: [shard1-2-data:/data/db]
    networks: [app-network]

  shard1-3:
    image: mongo:7
    command: mongod --shardsvr --replSet shard1 --bind_ip_all --port 27018
    volumes: [shard1-3-data:/data/db]
    networks: [app-network]

  shard1-init:
    image: mongo:7
    depends_on:
      shard1-1:
        condition: service_healthy
    networks: [app-network]
    entrypoint: >
      mongosh --host shard1-1:27018 --eval '
      rs.initiate({
        _id: "shard1",
        members: [
          { _id: 0, host: "shard1-1:27018" },
          { _id: 1, host: "shard1-2:27018" },
          { _id: 2, host: "shard1-3:27018" }
        ]
      })'

  # ---------------- SHARD 2 (REPLICA SET) ----------------
  shard2-1:
    image: mongo:7
    command: mongod --shardsvr --replSet shard2 --bind_ip_all --port 27019
    volumes: [shard2-1-data:/data/db]
    networks: [app-network]
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      start_period: 10s

  shard2-2:
    image: mongo:7
    command: mongod --shardsvr --replSet shard2 --bind_ip_all --port 27019
    volumes: [shard2-2-data:/data/db]
    networks: [app-network]

  shard2-3:
    image: mongo:7
    command: mongod --shardsvr --replSet shard2 --bind_ip_all --port 27019
    volumes: [shard2-3-data:/data/db]
    networks: [app-network]

  shard2-init:
    image: mongo:7
    depends_on:
      shard2-1:
        condition: service_healthy
    networks: [app-network]
    entrypoint: >
      mongosh --host shard2-1:27019 --eval '
      rs.initiate({
        _id: "shard2",
        members: [
          { _id: 0, host: "shard2-1:27019" },
          { _id: 1, host: "shard2-2:27019" },
          { _id: 2, host: "shard2-3:27019" }
        ]
      })'

  # ---------------- MONGOS ----------------
  mongos:
    image: mongo:7
    container_name: mongos
    command: mongos --configdb config_server/configSrv:27017 --bind_ip_all --port 27020
    ports:
      - "27020:27020"
    depends_on:
      configSrv:
        condition: service_healthy
    networks: [app-network]
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27020", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      start_period: 10s

  shard-add:
    image: mongo:7
    depends_on:
      mongos:
        condition: service_healthy
    networks: [app-network]
    entrypoint: >
      mongosh --host mongos:27020 --eval '
      sh.addShard("shard1/shard1-1:27018,shard1-2:27018,shard1-3:27018");
      sh.addShard("shard2/shard2-1:27019,shard2-2:27019,shard2-3:27019");
      '

  # ---------------- REDIS ----------------
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------- API ----------------
  pymongo_api:
    build:
      context: api_app
    container_name: pymongo_api
    depends_on:
      mongos:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos:27020"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  config-data:
  shard1-1-data:
  shard1-2-data:
  shard1-3-data:
  shard2-1-data:
  shard2-2-data:
  shard2-3-data: