name: sharding-repl-cache
services:

  configSrv:
    image: dh-mirror.gitverse.ru/mongo:latest
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-network:
    volumes:
      - config-data:/data/db
    command:
      [
        "--configsvr",
        "--replSet",
        "config_server",
        "--bind_ip_all",
        "--port",
        "27017"
      ] 
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongos_router:
    image: dh-mirror.gitverse.ru/mongo:latest
    restart: always
    ports:
      - "27020:27020"
    networks:
      app-network:
    command:
      - mongos
      - --configdb
      - config_server/configSrv:27017
      - --bind_ip_all
      - --port
      - "27020"
    healthcheck:
      test: [ "CMD", "mongosh", "--port", "27020", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongo_shard1_1:
    image: dh-mirror.gitverse.ru/mongo:latest
    restart: always
    networks:
      app-network:
    ports:
      - 27018:27018
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard1
      - --bind_ip_all
      - --port
      - "27018"
    volumes:
      - mongo_shard1_1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  mongo_shard1_2:
    image: dh-mirror.gitverse.ru/mongo:latest
    restart: always
    networks:
      app-network:
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard1
      - --bind_ip_all
      - --port
      - "27018"
    volumes:
      - mongo_shard1_2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  mongo_shard1_3:
    image: dh-mirror.gitverse.ru/mongo:latest
    restart: always
    networks:
      app-network:
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard1
      - --bind_ip_all
      - --port
      - "27018"
    volumes:
      - mongo_shard1_3_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  mongo_shard2_1:
    image: dh-mirror.gitverse.ru/mongo:latest
    restart: always
    networks:
      app-network:
    ports:
      - "27019:27019"
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard2
      - --bind_ip_all
      - --port
      - "27019"
    volumes:
      - mongo_shard2_1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  mongo_shard2_2:
    image: dh-mirror.gitverse.ru/mongo:latest
    restart: always
    networks:
      app-network:
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard2
      - --bind_ip_all
      - --port
      - "27019"
    volumes:
      - mongo_shard2_2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  mongo_shard2_3:
    image: dh-mirror.gitverse.ru/mongo:latest
    restart: always
    networks:
      app-network:
    command:
      - mongod
      - --shardsvr
      - --replSet
      - shard2
      - --bind_ip_all
      - --port
      - "27019"
    volumes:
      - mongo_shard2_3_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  pymongo_api:
    restart: always
    build: 
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongos_router
    ports:
      - 8080:8080
    networks:
      app-network:
    environment:
      MONGODB_URL: "mongodb://mongos_router:27020"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"

  redis:
    image: redis:latest
    restart: always
    ports:
      - 6379:6379
    networks:
      app-network:

networks:
  app-network:
    driver: bridge

volumes:
  mongo_shard1_1_data:
  mongo_shard1_2_data:
  mongo_shard1_3_data:
  mongo_shard2_1_data:
  mongo_shard2_2_data:
  mongo_shard2_3_data:
  config-data: