name: mongo-sharding-repl-cache
services:
  pymongo_api:
    container_name: pymongo_api
    build:
      context: api_app
      dockerfile: Dockerfile
    image: kazhem/pymongo_api:1.0.0
    platform: linux/amd64
    depends_on:
      - mongos_router
    ports:
      - 8181:8080
    environment:
      MONGODB_URL: "mongodb://mongos_router:27017"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"
      REDIS_CLUSTER_MODE:  true
    networks:
      - app-network

  config_server:
    image: arm64v8/mongo:latest
    container_name: config_server
    restart: always
    ports:
      - "27003:27003"
    networks:
      - app-network
    volumes:
      - config-data:/data/db
    command: mongod --configsvr --replSet config_server --port 27003

  shard1_r1:
    image: arm64v8/mongo:latest
    container_name: shard1_r1
    restart: always
    ports:
      - "27011:27011"
    networks:
      - app-network
    volumes:
      - shard1-r1-data:/data/db
    command: mongod --shardsvr --replSet shard1 --port 27011

  shard1_r2:
    image: arm64v8/mongo:latest
    container_name: shard1_r2
    restart: always
    ports:
      - "27012:27012"
    networks:
      - app-network
    volumes:
      - shard1-r2-data:/data/db
    command: mongod --shardsvr --replSet shard1 --port 27012

  shard1_r3:
    image: arm64v8/mongo:latest
    container_name: shard1_r3
    restart: always
    ports:
      - "27013:27013"
    networks:
      - app-network
    volumes:
      - shard1-r3-data:/data/db
    command: mongod --shardsvr --replSet shard1 --port 27013

  shard1_r4:
    image: arm64v8/mongo:latest
    container_name: shard1_r4
    restart: always
    ports:
      - "27014:27014"
    networks:
      - app-network
    volumes:
      - shard1-r4-data:/data/db
    command: mongod --shardsvr --replSet shard1 --port 27014

  shard2_r1:
    image: arm64v8/mongo:latest
    container_name: shard2_r1
    restart: always
    ports:
      - "27021:27021"
    networks:
      - app-network
    volumes:
      - shard2-r1-data:/data/db
    command: mongod --shardsvr --replSet shard2 --port 27021

  shard2_r2:
    image: arm64v8/mongo:latest
    container_name: shard2_r2
    restart: always
    ports:
      - "27022:27022"
    networks:
      - app-network
    volumes:
      - shard2-r2-data:/data/db
    command: mongod --shardsvr --replSet shard2 --port 27022

  shard2_r3:
    image: arm64v8/mongo:latest
    container_name: shard2_r3
    restart: always
    ports:
      - "27023:27023"
    networks:
      - app-network
    volumes:
      - shard2-r3-data:/data/db
    command: mongod --shardsvr --replSet shard2 --port 27023

  shard2_r4:
    image: arm64v8/mongo:latest
    container_name: shard2_r4
    restart: always
    ports:
      - "27024:27024"
    networks:
      - app-network
    volumes:
      - shard2-r4-data:/data/db
    command: mongod --shardsvr --replSet shard2 --port 27024

  mongos_router:
    image: arm64v8/mongo:latest
    container_name: mongos_router
    restart: always
    ports:
      - "27017:27017"
    networks:
      - app-network
    command: mongos --configdb config_server/config_server:27003 --bind_ip_all
    depends_on:
      - config_server
      - shard1_r1
      - shard1_r2
      - shard1_r3
      - shard1_r4
      - shard2_r1
      - shard2_r2
      - shard2_r3
      - shard2_r4

  redis:
    image: redis:alpine
    networks:
      - app-network
    ports:
      - "6379:6379"
    volumes:
      - redis_1_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 5s
      start_period: 10s

networks:
  app-network:
    driver: bridge

volumes:
  config-data: {}
  shard1-r1-data: {}
  shard1-r2-data: {}
  shard1-r3-data: {}
  shard1-r4-data: {}
  shard2-r1-data: {}
  shard2-r2-data: {}
  shard2-r3-data: {}
  shard2-r4-data: {}
  redis_1_data: { }
