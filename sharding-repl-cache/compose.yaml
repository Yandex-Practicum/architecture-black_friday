services:
  sharding-repl-cache:
    container_name: sharding-repl-cache
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mongo_router
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongo_router:27020/somedb"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"
    networks:
      - app-network

  configSrv:
    image: mongo:latest
    container_name: configSrv
    restart: always
    ports:
      - "27017:27017"
    networks:
      app-network:
        ipv4_address: 173.17.0.10
    volumes:
      - config-data:/data/db
    command:
      [ "--configsvr", "--replSet", "config_server", "--bind_ip_all", "--port", "27017" ]
    healthcheck:
      test: [ "CMD", 'mongo', "-eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
  shard1-1:
    image: mongo:latest
    container_name: shard1-1
    restart: always
    networks:
      - app-network
    volumes:
      - shard1-1-data:/data/db
    command:
      [ "--shardsvr", "--replSet", "shard1", "--bind_ip_all", "--port", "27018" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
  shard1-2:
    image: mongo:latest
    container_name: shard1-2
    restart: always
    networks:
      - app-network
    volumes:
      - shard1-2-data:/data/db
    command:
      [ "--shardsvr", "--replSet", "shard1", "--bind_ip_all", "--port", "27018" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
  shard1-3:
    image: mongo:latest
    container_name: shard1-3
    restart: always
    networks:
      - app-network
    volumes:
      - shard1-3-data:/data/db
    command:
      [ "--shardsvr", "--replSet", "shard1", "--bind_ip_all", "--port", "27018" ]
  shard2-1:
    image: mongo:latest
    container_name: shard2-1
    restart: always
    networks:
      - app-network
    volumes:
      - shard2-1-data:/data/db
    command:
      [ "--shardsvr", "--replSet", "shard2", "--bind_ip_all", "--port", "27019" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
  shard2-2:
    image: mongo:latest
    container_name: shard2-2
    restart: always
    networks:
      - app-network
    volumes:
      - shard2-2-data:/data/db
    command:
      [ "--shardsvr", "--replSet", "shard2", "--bind_ip_all", "--port", "27019" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
  shard2-3:
    image: mongo:latest
    container_name: shard2-3
    restart: always
    networks:
      - app-network
    volumes:
      - shard2-3-data:/data/db
    command:
      [ "--shardsvr", "--replSet", "shard2", "--bind_ip_all", "--port", "27019" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s
  mongo_router:
    image: mongo:latest
    container_name: mongos_router
    restart: always
    networks:
      app-network:
        ipv4_address: 173.17.0.7
    command:
      [ "mongos", "--configdb", "config_server/configSrv:27017", "--bind_ip_all", "--port", "27020" ]
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]

  redis:
    image: "redis:latest"
    container_name: redis
    ports:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 173.17.0.0/16


volumes:
  config-data:
  shard1-1-data:
  shard1-2-data:
  shard1-3-data:
  shard2-1-data:
  shard2-2-data:
  shard2-3-data:
  redis-data:
