version: "3.8"

services:
  configSrv:
    image: mongo:6.0
    container_name: configSrv
    command:
      [
        "mongod",
        "--configsvr",
        "--replSet",
        "config_server",
        "--port",
        "27017",
        "--bind_ip_all"
      ]
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - config-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - app-network

  shard1-1:
    image: mongo:6.0
    container_name: shard1-1
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet",
        "shard1",
        "--port",
        "27018",
        "--bind_ip_all"
      ]
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - shard1-1-data:/data/db
    networks:
      - app-network

  shard1-2:
    image: mongo:6.0
    container_name: shard1-2
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet",
        "shard1",
        "--port",
        "27018",
        "--bind_ip_all"
      ]
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
