name: sharding-repl-cache

services:
  # ================= CONFIG SERVER (RS) =================
  mongo-config:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongo-config
    command: >
      mongod --configsvr
             --replSet configReplSet
             --port 27019
             --bind_ip_all
    volumes:
      - mongo_config_data:/data/db
    ports:
      - "27019:27019"

  # ================= SHARD 1 (REPLICA SET) =================
  shard1-primary:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-primary
    command: >
      mongod --shardsvr
             --replSet shard1ReplSet
             --port 27018
             --bind_ip_all
    volumes:
      - shard1_primary_data:/data/db

  shard1-secondary1:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-secondary1
    command: >
      mongod --shardsvr
             --replSet shard1ReplSet
             --port 27018
             --bind_ip_all
    volumes:
      - shard1_secondary1_data:/data/db

  shard1-secondary2:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard1-secondary2
    command: >
      mongod --shardsvr
             --replSet shard1ReplSet
             --port 27018
             --bind_ip_all
    volumes:
      - shard1_secondary2_data:/data/db

  # ================= SHARD 2 (REPLICA SET) =================
  shard2-primary:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-primary
    command: >
      mongod --shardsvr
             --replSet shard2ReplSet
             --port 27018
             --bind_ip_all
    volumes:
      - shard2_primary_data:/data/db

  shard2-secondary1:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-secondary1
    command: >
      mongod --shardsvr
             --replSet shard2ReplSet
             --port 27018
             --bind_ip_all
    volumes:
      - shard2_secondary1_data:/data/db

  shard2-secondary2:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: shard2-secondary2
    command: >
      mongod --shardsvr
             --replSet shard2ReplSet
             --port 27018
             --bind_ip_all
    volumes:
      - shard2_secondary2_data:/data/db

  # ================= MONGOS ROUTER =================
  mongo-router:
    image: dh-mirror.gitverse.ru/mongo:latest
    container_name: mongo-router
    depends_on:
      - mongo-config
      - shard1-primary
      - shard2-primary
    command: >
      mongos --configdb configReplSet/mongo-config:27019
             --bind_ip_all
    ports:
      - "27017:27017"

  # ================= REDIS CACHE =================
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  # ================= APPLICATION =================
  pymongo_api:
    container_name: pymongo_api
    build:
      context: api_app
      dockerfile: Dockerfile
    depends_on:
      - mongo-router
      - redis
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongo-router:27017"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"

volumes:
  mongo_config_data:

  shard1_primary_data:
  shard1_secondary1_data:
  shard1_secondary2_data:

  shard2_primary_data:
  shard2_secondary1_data:
  shard2_secondary2_data:
