name: sharding-repl-cache

services:
  # Конфигурационный сервер (Config Server Replica Set, 1 узел)
  configsrv:
    container_name: configsrv
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --configsvr --replSet configReplSet --port 27019
    volumes:
      - configsrv_data:/data/db

  # Шард 1 (Replica Set из 3 узлов)
  shard1-primary:
    container_name: shard1-primary
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018
    volumes:
      - shard1_primary_data:/data/db

  shard1-secondary1:
    container_name: shard1-secondary1
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018
    volumes:
      - shard1_secondary1_data:/data/db

  shard1-secondary2:
    container_name: shard1-secondary2
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018
    volumes:
      - shard1_secondary2_data:/data/db

  # Шард 2 (Replica Set из 3 узлов)
  shard2-primary:
    container_name: shard2-primary
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard2ReplSet --port 27018
    volumes:
      - shard2_primary_data:/data/db

  shard2-secondary1:
    container_name: shard2-secondary1
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard2ReplSet --port 27018
    volumes:
      - shard2_secondary1_data:/data/db

  shard2-secondary2:
    container_name: shard2-secondary2
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongod --shardsvr --replSet shard2ReplSet --port 27018
    volumes:
      - shard2_secondary2_data:/data/db

  # Роутер (mongos)
  mongos_router:
    container_name: mongos_router
    image: dh-mirror.gitverse.ru/mongo:latest
    command: mongos --configdb configReplSet/configsrv:27019 --port 27017 --bind_ip_all
    ports:
      - "27017:27017"
    depends_on:
      - configsrv
      - shard1-primary
      - shard1-secondary1
      - shard1-secondary2
      - shard2-primary
      - shard2-secondary1
      - shard2-secondary2

  # Redis для кеширования
  redis:
    container_name: redis_cache
    image: redis:latest
    ports:
      - "6379:6379"

  # Приложение
  pymongo_api:
    container_name: pymongo_api
    image: kazhem/pymongo_api:1.0.0
#    build: 
#      context: api_app
#      dockerfile: Dockerfile
    depends_on:
      - mongos_router
      - redis
    ports:
      - 8080:8080
    environment:
      MONGODB_URL: "mongodb://mongos_router:27017"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://redis:6379"

volumes:
  configsrv_data:
  shard1_primary_data:
  shard1_secondary1_data:
  shard1_secondary2_data:
  shard2_primary_data:
  shard2_secondary1_data:
  shard2_secondary2_data: