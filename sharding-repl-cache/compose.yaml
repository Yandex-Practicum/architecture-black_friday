name: sharding-repl-cache

services:
  configSrv:
    image: mongo:7.0
    container_name: configSrv
    command: mongod --configsvr --replSet configReplSet --bind_ip_all --port 27017
    ports:
      - "27019:27017"
    volumes:
      - configsrv_data:/data/db

  shard1-1:
    image: mongo:7.0
    container_name: shard1-1
    command: mongod --shardsvr --replSet shard1ReplSet --bind_ip_all --port 27017
    ports:
      - "27111:27017"
    volumes:
      - shard1_1_data:/data/db

  shard1-2:
    image: mongo:7.0
    container_name: shard1-2
    command: mongod --shardsvr --replSet shard1ReplSet --bind_ip_all --port 27017
    ports:
      - "27112:27017"
    volumes:
      - shard1_2_data:/data/db

  shard1-3:
    image: mongo:7.0
    container_name: shard1-3
    command: mongod --shardsvr --replSet shard1ReplSet --bind_ip_all --port 27017
    ports:
      - "27113:27017"
    volumes:
      - shard1_3_data:/data/db

  shard2-1:
    image: mongo:7.0
    container_name: shard2-1
    command: mongod --shardsvr --replSet shard2ReplSet --bind_ip_all --port 27017
    ports:
      - "27211:27017"
    volumes:
      - shard2_1_data:/data/db

  shard2-2:
    image: mongo:7.0
    container_name: shard2-2
    command: mongod --shardsvr --replSet shard2ReplSet --bind_ip_all --port 27017
    ports:
      - "27212:27017"
    volumes:
      - shard2_2_data:/data/db

  shard2-3:
    image: mongo:7.0
    container_name: shard2-3
    command: mongod --shardsvr --replSet shard2ReplSet --bind_ip_all --port 27017
    ports:
      - "27213:27017"
    volumes:
      - shard2_3_data:/data/db

  mongos_router:
    image: mongo:7.0
    container_name: mongos_router
    depends_on:
      - configSrv
      - shard1-1
      - shard1-2
      - shard1-3
      - shard2-1
      - shard2-2
      - shard2-3
    command: mongos --configdb configReplSet/configSrv:27017 --bind_ip_all --port 27017
    ports:
      - "27017:27017"

  pymongo-api:
    build: ./api_app
    container_name: pymongo-api
    depends_on:
      - mongos_router
      - redis
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: mongodb://mongos_router:27017/
      MONGODB_DATABASE_NAME: somedb
      REDIS_URL: "redis://redis:6379"
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  configsrv_data:
  shard1_1_data:
  shard1_2_data:
  shard1_3_data:
  shard2_1_data:
  shard2_2_data:
  shard2_3_data: