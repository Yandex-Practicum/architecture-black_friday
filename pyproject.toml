[tool.ruff]
target-version = "py311"
line-length = 120

# Exclude directories
exclude = [
    ".git",
    "scripts",
    "api_app",  # не будем спорить с авторами курса и оставим базовое приложение как есть
]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    "EM",     # flake8-errmsg
    "ISC",    # flake8-implicit-str-concat
    "G",      # flake8-logging-format
    "PIE",    # flake8-pie
    "PT",     # flake8-pytest-style
    "Q",      # flake8-quotes
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SIM",    # flake8-simplify
    "PTH",    # flake8-use-pathlib
]

ignore = [
    "E501",   # line too long (handled by line-length)
    "DTZ005", # datetime.datetime.now() without tz (нужно по сути для тестов, пойдёт и так)
    "PTH123", # pathlib vs os.path (os.path - нормально)
]

[tool.ruff.lint.per-file-ignores]
# Test files can have asserts, magic values, etc
"**/test_*.py" = ["S101", "PLR2004"]
"**/*_test.py" = ["S101", "PLR2004"]
"**/tests/**" = ["S101", "PLR2004"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

